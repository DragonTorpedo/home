<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
</head>
<body style="margin: 0; background: #0a0a0a; min-height: 100vh;">

<div id="p1-scene" style="perspective: 1200px; padding: 40px 10px; font-family: 'Inter', system-ui, sans-serif;">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

        :root { 
            --p1-accent: #00d9ff; 
            --p1-glow: rgba(0, 217, 255, 0.3); 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --highlight: rgba(255, 255, 255, 0.1);
        }

        .glass-chassis {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 1px var(--highlight);
            position: relative;
            max-width: 850px;
            margin: auto;
            overflow: hidden;
            color: #fff;
        }

        .grid-bg {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 0; pointer-events: none;
        }

        .bubble {
            position: absolute; background: #fff; border-radius: 50%; 
            pointer-events: none; z-index: 1; animation: bubble-rise 5s infinite linear;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        @keyframes bubble-rise {
            0% { transform: translateY(100%) scale(0); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-120%) scale(1); opacity: 0; }
        }

        .habit-table-container { overflow-x: auto; border-radius: 20px; position: relative; z-index: 2; margin-top: 20px;}
        .habit-table-container::-webkit-scrollbar { height: 4px; }
        .habit-table-container::-webkit-scrollbar-thumb { background: var(--p1-accent); border-radius: 10px; }

        table { border-collapse: separate; border-spacing: 4px; width: 100%; }
        .habit-label { 
            position: sticky; left: 0; background: rgba(20,20,20,0.8); 
            backdrop-filter: blur(10px); z-index: 10; font-size: 11px; 
            font-weight: 700; padding: 12px; min-width: 140px; border-radius: 8px;
        }

        .cell { 
            width: 24px; height: 24px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; 
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .cell.active { 
            background: var(--p1-accent); 
            box-shadow: 0 0 15px var(--p1-glow); 
            border-color: #fff; transform: scale(1.1);
        }

        .btn-glass {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 10px;
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-glass:hover { background: rgba(255,255,255,0.15); }

        .stat-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 24px; text-align: center;
        }

        #systemLog {
            font-family: 'Courier New', monospace; font-size: 10px;
            color: var(--p1-accent); height: 45px; overflow-y: auto;
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;
        }
    </style>

    <div id="p1-card" class="glass-chassis" onmousemove="handleParallax(event)" onmouseleave="resetParallax()" style="padding: 40px; transition: transform 0.1s ease-out;">
        <div class="grid-bg"></div>
        <div id="bubbles-container"></div>
        
        <div style="position: relative; z-index: 5;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px;">
                <div>
                    <div id="p1-status" style="font-size: 9px; font-weight: 800; letter-spacing: 3px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 5px;">Habit_Kernel // Stable_v7</div>
                    <h1 style="margin: 0; font-size: 28px; font-weight: 200; letter-spacing: -1px;">April <b id="mode-text" style="color: var(--p1-accent); font-weight: 800; transition: 0.4s;">2026</b></h1>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
                    <div onclick="toggleView()" style="width: 50px; height: 24px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; cursor: pointer; position: relative;">
                        <div id="p1-toggle" style="width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); box-shadow: 0 0 10px #fff;"></div>
                    </div>
                    <span id="view-label" style="font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.5);">GRID_OPERATIONS</span>
                </div>
            </div>

            <div id="view-grid">
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button onclick="exportData()" class="btn-glass">💾 BACKUP</button>
                    <button onclick="toggleRestoreBox()" class="btn-glass">📥 RESTORE</button>
                    <div id="streak-flame" style="margin-left: auto; background: rgba(255,69,0,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(255,69,0,0.3); font-size: 10px; font-weight: 800; color: #ff4500;">🔥 STREAK_ACTIVE</div>
                </div>

                <div class="habit-table-container">
                    <table>
                        <thead><tr id="calendarHeader"></tr></thead>
                        <tbody id="habitRows"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-analysis" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                    <div class="stat-card">
                        <div style="font-size: 8px; color: rgba(255,255,255,0.4); margin-bottom: 5px;">CONSISTENCY</div>
                        <div id="avg-consistency" style="font-size: 22px; font-weight: 800;">--%</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 8px; color: rgba(255,255,255,0.4); margin-bottom: 5px;">7D_LOGS</div>
                        <div id="total-logs" style="font-size: 22px; font-weight: 800;">0</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 8px; color: rgba(255,255,255,0.4); margin-bottom: 5px;">PEAK_DAY</div>
                        <div id="peak-day" style="font-size: 14px; font-weight: 800; color: var(--p1-accent);">--</div>
                    </div>
                </div>
                <div id="friction-report" style="display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px;"></div>
            </div>

            <div style="margin-top: 30px;">
                <div style="font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.2); margin-bottom: 8px; letter-spacing: 2px;">NEURAL_OUTPUT_FEED</div>
                <div id="systemLog">> Kernel Online...</div>
            </div>
        </div>

        <div id="restoreContainer" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); padding: 30px; border-radius: 30px; border: 1px solid var(--p1-accent); z-index: 100;">
            <textarea id="importArea" placeholder="Paste JSON data..." style="width: 100%; height: 80px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; font-family: monospace; font-size: 10px; margin-bottom: 15px;"></textarea>
            <button onclick="processImport()" class="btn-glass" style="background: var(--p1-accent); color: #000;">LOAD_CORE</button>
            <button onclick="toggleRestoreBox()" class="btn-glass">EXIT</button>
        </div>
    </div>
</div>

<script>
    const habits = [
        { name: "Plan day", emoji: "🌠" }, { name: "Emails", emoji: "📬" },
        { name: "Read", emoji: "📖" }, { name: "Violin", emoji: "🎻" },
        { name: "Math", emoji: "📐" }, { name: "Exercise", emoji: "🏋️" }
    ];

    const now = new Date();
    const curM = now.getMonth(); const curY = now.getFullYear(); const today = now.getDate();
    const daysInMonth = new Date(curY, curM + 1, 0).getDate();
    let history = JSON.parse(localStorage.getItem('habit_glass_v1')) || {};
    let isAnalysis = false;

    function handleParallax(e) {
        const card = document.getElementById('p1-card');
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) - rect.width / 2;
        const y = (e.clientY - rect.top) - rect.height / 2;
        card.style.transform = `rotateX(${-y / 30}deg) rotateY(${x / 40}deg)`;
    }

    function resetParallax() {
        document.getElementById('p1-card').style.transform = `rotateX(0deg) rotateY(0deg)`;
    }

    function toggleView() {
        isAnalysis = !isAnalysis;
        const toggle = document.getElementById('p1-toggle');
        const gridView = document.getElementById('view-grid');
        const anaView = document.getElementById('view-analysis');
        
        if(isAnalysis) {
            toggle.style.left = '28px';
            document.documentElement.style.setProperty('--p1-accent', '#ff4500');
            document.documentElement.style.setProperty('--p1-glow', 'rgba(255, 69, 0, 0.4)');
            gridView.style.display = 'none';
            anaView.style.display = 'block';
            document.getElementById('view-label').innerText = "DEEP_ANALYTICS";
            runWeeklyScan();
        } else {
            toggle.style.left = '3px';
            document.documentElement.style.setProperty('--p1-accent', '#00d9ff');
            document.documentElement.style.setProperty('--p1-glow', 'rgba(0, 217, 255, 0.3)');
            gridView.style.display = 'block';
            anaView.style.display = 'none';
            document.getElementById('view-label').innerText = "GRID_OPERATIONS";
        }
        addLog(isAnalysis ? "ANALYTICS_SYNC_START" : "GRID_VIEW_RESTORED");
    }

    function addLog(msg) {
        const log = document.getElementById('systemLog');
        log.innerHTML += `<br>> [${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}] ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    function render() {
        let hHtml = '<th class="habit-label">HABIT_CORE</th>';
        for(let i=1; i<=daysInMonth; i++) {
            hHtml += `<th style="font-size: 9px; opacity: 0.3; padding: 5px; color: ${i===today?'#fff':''}">${i}</th>`;
        }
        document.getElementById('calendarHeader').innerHTML = hHtml;

        let rHtml = "";
        habits.forEach(h => {
            rHtml += `<tr><td class="habit-label">${h.emoji} ${h.name.toUpperCase()}</td>`;
            for(let i=1; i<=daysInMonth; i++) {
                const k = `${curY}-${curM}-${h.name}-${i}`;
                rHtml += `<td><div class="cell ${history[k]?'active':''}" onclick="toggleHabit('${h.name}', ${i})"></div></td>`;
            }
            rHtml += `</tr>`;
        });
        document.getElementById('habitRows').innerHTML = rHtml;
    }

    function toggleHabit(name, day) {
        const k = `${curY}-${curM}-${name}-${day}`;
        history[k] = !history[k];
        localStorage.setItem('habit_glass_v1', JSON.stringify(history));
        addLog(`${name.toUpperCase()} // D${day} // ${history[k]?'ON':'OFF'}`);
        render();
    }

    function runWeeklyScan() {
        let total = 0; let habitCounts = {};
        for (let i = 0; i < 7; i++) {
            let d = today - i; if (d <= 0) continue;
            habits.forEach(h => {
                if (history[`${curY}-${curM}-${h.name}-${d}`]) {
                    total++; habitCounts[h.name] = (habitCounts[h.name] || 0) + 1;
                }
            });
        }
        document.getElementById('avg-consistency').innerText = Math.round((total/(habits.length*7))*100) + "%";
        document.getElementById('total-logs').innerText = total;
        
        let fHtml = "";
        habits.forEach(h => {
            let c = habitCounts[h.name] || 0;
            let pct = (c/7)*100;
            fHtml += `<div style="font-size:10px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${h.name.toUpperCase()}</span><span>${c}/7</span></div>
                <div style="height:3px; background:rgba(255,255,255,0.1); border-radius:5px;"><div style="width:${pct}%; height:100%; background:var(--p1-accent); box-shadow:0 0 10px var(--p1-glow);"></div></div>
            </div>`;
        });
        document.getElementById('friction-report').innerHTML = fHtml;
    }

    function createBubbles() {
        const container = document.getElementById('bubbles-container');
        for(let i=0; i<15; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.left = Math.random() * 100 + '%';
            b.style.width = b.style.height = Math.random() * 4 + 2 + 'px';
            b.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(b);
        }
    }

    window.exportData = () => { navigator.clipboard.writeText(JSON.stringify(history)); addLog("BACKUP_CLIPBOARD_SYNC"); };
    window.toggleRestoreBox = () => { const s = document.getElementById('restoreContainer').style; s.display = s.display === 'none' ? 'block' : 'none'; };
    window.processImport = () => { history = JSON.parse(document.getElementById('importArea').value); localStorage.setItem('habit_glass_v1', JSON.stringify(history)); render(); toggleRestoreBox(); addLog("CORE_RECON_COMPLETE"); };

    createBubbles();
    render();
</script>

</body>
</html>
